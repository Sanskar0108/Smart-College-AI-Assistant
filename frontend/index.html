<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart College AI Assistant - Study Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Left Navigation Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">
          <!-- Brain/Intelligence Logo -->
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-3.12 3 3 0 0 1 0-4.88 2.5 2.5 0 0 1 0-3.12A2.5 2.5 0 0 1 9.5 2z"></path>
            <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-3.12 3 3 0 0 0 0-4.88 2.5 2.5 0 0 0 0-3.12A2.5 2.5 0 0 0 14.5 2z"></path>
          </svg>
        </div>
        <div>
          <h1 class="logo-text">Smart College</h1>
          <div class="logo-subtext">AI Study Workspace</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-route="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-route="upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <span>Upload Notes</span>
        </div>
        <div class="nav-item" data-route="chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>Chat with Notes</span>
        </div>
        <div class="nav-item" data-route="flashcards">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          <span>Flashcards</span>
        </div>
        <div class="nav-item" data-route="quiz">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          <span>Practice Quiz</span>
        </div>
      </nav>

      <!-- Sidebar Active Document widget -->
      <div id="active-doc-widget-container">
        <!-- Injected via app.js -->
      </div>

      <!-- Sidebar User Profile Area -->
      <div id="user-profile-container">
        <!-- Injected via app.js -->
      </div>
    </aside>

    <!-- Main Viewport Area -->
    <main class="main-viewport">
      <!-- Top header bar -->
      <header class="top-header">
        <h2 id="header-title">Study Workspace Dashboard</h2>
        
        <div class="header-actions">
          <!-- Active file state -->
          <div id="header-active-doc-indicator">
            <!-- Injected via app.js -->
          </div>
        </div>
      </header>

      <!-- Dynamic View Container -->
      <div class="view-content" id="view-container">
        <!-- Views rendered by components.js -->
      </div>
    </main>

  </div>

  <!-- Toast Notification Holder -->
  <div class="toast-container" id="toast-holder"></div>

  <!-- Javascript Modules -->
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
